<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Time Cap — 時間遅延型の感情保存</title>
<meta name="description" content="今の感情を封じて、未来に届ける。SNSではない、時間遅延型の感情保存インターフェース。">
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;
  --bg-2:#1C1C1E;
  --bg-3:#2C2C2E;
  --bg-4:#3A3A3C;
  --card:#1C1C1E;
  --card-2:#141414;
  --ink:#FFFFFF;
  --ink-2:#ABABAB;
  --ink-3:#6E6E73;
  --ink-4:#48484A;
  --accent:#FFFFFF;
  --accent-inv:#000000;
  --red:#FF3B30;
  --coral:var(--accent);
  --coral-soft:rgba(255,255,255,.08);
  --coral-deep:#FFFFFF;
  --blue:#8E8E93;
  --blue-soft:rgba(255,255,255,.06);
  --sage:#636366;
  --sage-soft:rgba(255,255,255,.04);
  --navy:#000000;
  --navy-2:#1C1C1E;
  --glass:rgba(28,28,30,.82);
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --shadow-lg:0 8px 40px rgba(0,0,0,.65);
  --shadow-glow:0 0 0 1px rgba(255,255,255,.08);
  --grain:0;
  --r:20px;--r-sm:14px;--r-pill:999px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Hiragino Sans','Inter',sans-serif;
  --font-display:'Inter',var(--font);
  --font-sans:'Inter',var(--font);
  --font-weight:300;
  --spring:cubic-bezier(.34,1.56,.64,1);
  --smooth:cubic-bezier(.4,0,.2,1);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --nav-h:72px;
}
[data-theme="light"]{
  --bg:#F5F5F3;--bg-2:#EBEBE9;--bg-3:#E0E0DE;--bg-4:#D2D2D0;
  --card:#FFFFFF;--card-2:#FAFAF8;
  --ink:#0A0A0A;--ink-2:#5A5A5A;--ink-3:#949494;--ink-4:#C8C8C6;
  --accent:#0A0A0A;--accent-inv:#FFFFFF;
  --glass:rgba(255,255,255,.88);
  --shadow:0 8px 32px rgba(0,0,0,.06);
  --shadow-lg:0 16px 48px rgba(0,0,0,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--ink);
  min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  transition:background .5s,color .5s;
}
button,input,textarea{font:inherit;color:inherit}
body{font-weight:400}
button{cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
.hidden{display:none!important}
body::before{display:none}
body::after{display:none}
.app{max-width:430px;margin:0 auto;min-height:100dvh;position:relative}
.status{padding-top:calc(12px + var(--safe-t));padding-left:24px;padding-right:24px}
.panel{display:none;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 24px);animation:panelIn .45s var(--spring) both}
.panel.active{display:block}
#panel-home{overflow-y:auto;-webkit-overflow-scrolling:touch}
@keyframes panelIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* Brand */
.brand-tag{
  font-family:var(--font-display);font-size:10px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);
  margin-bottom:4px;
}
.home-greeting h1{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:-.03em;line-height:1.15}
.home-greeting .sub{font-size:16px;color:var(--ink-2);margin-top:10px;line-height:1.5}
.home-greeting .sub strong{color:var(--ink);font-weight:600}

.friends-pulse{
  margin:24px 24px 0;padding:18px 20px;border-radius:var(--r);
  background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;
}
.friends-pulse .dots{display:flex}
.friends-pulse .dot{
  width:32px;height:32px;border-radius:50%;margin-left:-8px;
  border:2.5px solid var(--card);display:grid;place-items:center;
  font-size:11px;font-weight:600;color:#fff;
}
.friends-pulse .dot:first-child{margin-left:0}
.friends-pulse p{font-size:14px;color:var(--ink-2);line-height:1.5;flex:1}
.friends-pulse em{font-style:normal;color:var(--ink);font-weight:600}
.prompt-glass{
  margin:16px 24px 0;padding:20px 22px;border-radius:var(--r);
  background:var(--card-2);box-shadow:var(--shadow);
  border:1px solid var(--bg-3);
}
.prompt-glass .label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
.prompt-glass .text{font-size:17px;font-weight:600;margin-top:8px;line-height:1.4}
.prompt-glass .hint{font-size:13px;color:var(--ink-2);margin-top:6px}

.sec-label{padding:32px 24px 14px;font-size:12px;font-weight:600;color:var(--ink-3);letter-spacing:.08em}

/* Timeline cards */
.capsule-group{margin:0 24px 24px;position:relative}
.capsule-group-title{font-size:14px;font-weight:600;color:var(--ink-2);margin-bottom:10px;display:flex;justify-content:space-between}
.capsule-group-title .count{font-size:13px;color:var(--ink-3);font-weight:500}

.timeline-card{
  padding:22px;border-radius:var(--r);background:var(--card);
  box-shadow:var(--shadow);position:relative;overflow:hidden;
  animation:capsuleGlow 4s ease-in-out infinite;
  transition:transform .35s var(--spring);
}
.timeline-card.ready{animation:capsuleShake 3s ease-in-out infinite,capsuleGlow 4s ease-in-out infinite;box-shadow:var(--shadow),var(--shadow-glow)}
.timeline-card:active{transform:scale(.98)}
@keyframes capsuleGlow{0%,100%{box-shadow:var(--shadow)}50%{box-shadow:var(--shadow),var(--shadow-glow)}}
.pill-card .pill-num{color:var(--ink)}
.media-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.media-btn{
  padding:28px 16px;border-radius:var(--r);background:var(--card);
  box-shadow:var(--shadow);text-align:center;
  border:1px solid var(--bg-3);transition:all .25s var(--spring);
}
.media-btn.on{background:var(--ink);color:var(--accent-inv);border-color:var(--ink)}
.media-btn.on .name{color:var(--accent-inv)}
.media-btn .icon{font-size:32px;margin-bottom:8px;filter:grayscale(1)}
.media-btn.on .icon{filter:grayscale(1) brightness(2)}
.media-btn .name{font-size:13px;font-weight:600;letter-spacing:.04em}
.caption-input{
  width:100%;border:none;outline:none;resize:none;min-height:52px;
  font-size:14px;line-height:1.5;background:transparent;
  padding:0;margin-bottom:20px;color:var(--ink-2);
}
.caption-input::placeholder{color:var(--ink-4)}
.duration-pill.on{background:var(--ink);color:var(--accent-inv);box-shadow:var(--shadow)}
.seal-cta{
  width:100%;padding:18px;border-radius:var(--r-pill);
  background:var(--ink);color:var(--accent-inv);
  font-family:var(--font-display);font-size:14px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  box-shadow:var(--shadow-lg);transition:transform .2s var(--spring);
}
.nav-btn.active{color:var(--ink)}
.nav-create{background:var(--ink);box-shadow:var(--shadow-lg)}
.tl-badge{background:var(--bg-3);color:var(--ink-2)}
.tl-badge.open{background:var(--ink);color:var(--accent-inv)}
.shelf-layer .shelf-num{color:var(--ink)}
.stat-card .n,.vault-hero .num,.future-pending .n,.streak-card .n{color:var(--ink)}
.group-sync .countdown{color:var(--accent-inv)}
.sync-btn,.notif-card .open-btn{background:var(--ink);color:var(--accent-inv)}
.notif-card.unread::before{background:var(--ink)}
.export-btn{background:var(--ink);color:var(--accent-inv)}
.toggle.on{background:var(--ink)}
.profile-avatar{background:var(--ink)}
@keyframes capsuleShake{0%,100%{transform:rotate(0)}25%{transform:rotate(.3deg)}75%{transform:rotate(-.3deg)}}

.timeline-card .title{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase}
.timeline-card .count{font-size:22px;font-weight:700;margin-top:6px;letter-spacing:-.02em}
.pill-stack{padding:0 24px;display:flex;flex-direction:column;gap:12px}
.pill-card{
  padding:18px 22px;border-radius:var(--r-pill);background:var(--card);
  box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;
  transition:transform .2s var(--spring),box-shadow .3s;
  will-change:transform;
}
.pill-card.float{animation:pillFloat 5s ease-in-out infinite}
@keyframes pillFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.pill-card .pill-label{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--ink-3)}
.pill-card .pill-num{font-size:28px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.pill-card .pill-mosaic{
  width:72px;height:36px;border-radius:12px;position:relative;overflow:hidden;
  background:var(--bg-2);display:grid;place-items:center;
  font-size:11px;letter-spacing:2px;color:var(--ink-3);
}
.pill-card .pill-mosaic.blur-full{filter:blur(6px);opacity:.4}
.pill-card .pill-mosaic.blur-semi{
  filter:blur(3px);opacity:.55;
  background:repeating-linear-gradient(45deg,var(--bg-3),var(--bg-3) 4px,transparent 4px,transparent 8px);
}
.pill-card .pill-mosaic.unlocked{filter:none;opacity:.7;background:var(--bg-2)}
.quorum-bar{
  margin:12px 24px 0;padding:12px 16px;border-radius:var(--r-sm);
  background:var(--bg-2);font-size:12px;color:var(--ink-2);line-height:1.45;
  border:1px solid var(--bg-3);
}
.quorum-bar strong{color:var(--ink);font-weight:600}

.timeline-card .blur-block{
  margin-top:14px;height:56px;border-radius:16px;
  background:linear-gradient(90deg,var(--bg-2) 0%,var(--bg) 50%,var(--bg-2) 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;letter-spacing:4px;color:var(--ink-3);opacity:.35;
  position:relative;overflow:hidden;
}
.timeline-card .blur-block::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 50%,rgba(255,107,90,.08),transparent 60%),
             radial-gradient(circle at 70% 50%,rgba(167,199,231,.08),transparent 60%);
  filter:blur(8px);
}
.timeline-card .particles{position:absolute;top:12px;right:16px;display:flex;gap:4px}
.timeline-card .particles span{
  width:6px;height:6px;border-radius:50%;background:var(--ink-3);opacity:.25;
  animation:particleDrift 3s ease-in-out infinite;
}
.timeline-card .particles span:nth-child(2){animation-delay:.5s;opacity:.15}
.timeline-card .particles span:nth-child(3){animation-delay:1s;opacity:.1}
@keyframes particleDrift{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Capsules shelf — parallax depth */
.shelf-wrap{padding:8px 24px 40px;perspective:800px}
.shelf-layer{
  padding:24px 22px;border-radius:var(--r);background:var(--card);
  box-shadow:var(--shadow);margin-bottom:16px;text-align:center;
  transition:transform .1s ease-out,filter .3s;
  position:relative;overflow:hidden;
}
.shelf-layer[data-depth="0"]{transform:translateZ(0);opacity:1;filter:blur(0)}
.shelf-layer[data-depth="1"]{transform:scale(.96) translateY(-4px);opacity:.85;filter:blur(.5px)}
.shelf-layer[data-depth="2"]{transform:scale(.92) translateY(-8px);opacity:.65;filter:blur(1.5px)}
.shelf-layer .shelf-label{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--ink-3)}
.shelf-layer .shelf-num{font-size:40px;font-weight:700;color:var(--ink);margin:8px 0 4px;letter-spacing:-.03em}
.shelf-layer .shelf-sub{font-size:13px;color:var(--ink-2)}
.shelf-layer .shelf-line{height:1px;background:var(--bg-2);margin-top:16px}

.vault-hero{
  margin:8px 24px 0;padding:32px 24px;border-radius:var(--r);
  background:linear-gradient(160deg,var(--navy),var(--navy-2));
  color:#F5F3EF;box-shadow:var(--shadow-lg);text-align:center;
}
.vault-hero .num{font-size:52px;font-weight:700;letter-spacing:-.04em}
.vault-hero .label{font-size:14px;opacity:.65;margin-top:6px}

.pending-scroll{padding:8px 24px 0;display:flex;flex-direction:column;gap:10px}
.pending-row{
  padding:16px 18px;border-radius:var(--r-sm);background:var(--card);
  box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;
}
.pending-row .seal-icon{width:44px;height:44px;border-radius:16px;background:var(--coral-soft);display:grid;place-items:center;font-size:20px}
.pending-row .title{font-size:15px;font-weight:600}
.pending-row .sub{font-size:12px;color:var(--ink-3);margin-top:2px}

/* Create */
.create-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(13,17,23,.5);
  opacity:0;pointer-events:none;transition:opacity .4s,backdrop-filter .4s;
}
.create-overlay.open{opacity:1;pointer-events:auto;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.create-sheet{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:430px;max-height:94dvh;overflow-y:auto;
  background:var(--bg);border-radius:var(--r) var(--r) 0 0;
  padding:12px 24px calc(28px + var(--safe-b));
  transition:transform .5s var(--spring);box-shadow:0 -20px 60px rgba(0,0,0,.12);
}
.create-overlay.open .create-sheet{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:36px;height:5px;border-radius:99px;background:var(--ink-3);opacity:.25;margin:0 auto 20px}
.create-title{font-size:26px;font-weight:700;line-height:1.35;margin-bottom:24px;letter-spacing:-.02em}

.dest-toggle{display:flex;gap:8px;margin-bottom:22px;padding:4px;background:var(--bg-2);border-radius:var(--r-pill)}
.dest-toggle button{flex:1;padding:10px;border-radius:var(--r-pill);font-size:13px;font-weight:600;color:var(--ink-2);transition:all .3s var(--spring)}
.dest-toggle button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}

.create-input{
  width:100%;border:none;outline:none;resize:none;min-height:88px;
  font-size:15px;line-height:1.5;background:var(--card);
  padding:16px 18px;border-radius:var(--r-sm);box-shadow:var(--shadow);margin-bottom:14px;
  border:1px solid var(--bg-3);
}
.create-input::placeholder{color:var(--ink-3)}
.create-media-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.create-pick{
  padding:14px;border-radius:var(--r-sm);background:var(--bg-2);
  border:1px solid var(--bg-3);font-size:13px;font-weight:600;text-align:center;
}
.create-pick.has-media{background:var(--bg-3);border-color:var(--ink-3)}

.duration-label{font-size:12px;font-weight:600;color:var(--ink-3);margin-bottom:12px;letter-spacing:.04em}
.duration-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.duration-pill{
  padding:11px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;
  background:var(--card);color:var(--ink-2);box-shadow:var(--shadow);
  transition:all .35s var(--spring);border:1px solid var(--bg-3);
}
.duration-pill.on{background:var(--ink);color:var(--accent-inv);transform:scale(1.02)}

.custom-days{
  display:none;align-items:center;gap:10px;margin-bottom:20px;padding:14px 18px;
  border-radius:var(--r-sm);background:var(--card);box-shadow:var(--shadow);
}
.custom-days.show{display:flex}
.custom-days input{
  width:72px;padding:8px 12px;border-radius:12px;border:none;
  background:var(--bg-2);text-align:center;font-size:16px;font-weight:600;
}
.custom-days span{font-size:14px;color:var(--ink-2)}

.seal-cta{
  width:100%;padding:18px;border-radius:var(--r-pill);
  background:var(--ink);color:var(--accent-inv);
  font-size:16px;font-weight:700;letter-spacing:.04em;
  box-shadow:var(--shadow-lg);
  transition:transform .2s var(--spring);
}
.seal-cta:active{transform:scale(.97)}

/* Seal animation */
.seal-anim{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.4);
  display:none;align-items:center;justify-content:center;flex-direction:column;
}
.seal-anim.active{display:flex}
.seal-anim .origami{
  width:200px;padding:20px;border-radius:16px;
  background:linear-gradient(180deg,#FFFEF9,#FAF6EE);
  box-shadow:var(--shadow-lg);font-size:14px;line-height:1.5;color:var(--ink);
  transition:transform .4s var(--spring),opacity .4s;
  margin-bottom:24px;
}
.seal-anim.phase-fold .origami{transform:perspective(400px) rotateX(75deg) scale(.7);opacity:.3}
.seal-anim .envelope{width:140px;height:100px;position:relative;transition:transform 1.2s var(--smooth)}
.seal-anim .env-body{width:100%;height:80px;background:linear-gradient(180deg,#F5E6D3,#E8D4BC);border-radius:8px 8px 12px 12px;position:absolute;bottom:0;box-shadow:0 10px 40px rgba(0,0,0,.35)}
.seal-anim .env-flap{width:0;height:0;position:absolute;top:20px;left:50%;transform:translateX(-50%);border-left:70px solid transparent;border-right:70px solid transparent;border-top:50px solid #EDD9C0;transform-origin:top center;transition:transform .6s var(--spring)}
.seal-anim .wax{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#E85A4A,#B84A3A);position:absolute;top:55px;left:50%;transform:translateX(-50%);box-shadow:0 4px 12px rgba(184,74,58,.5);transition:transform .5s var(--spring)}
.seal-anim.phase-fold .env-flap{transform:translateX(-50%) rotateX(20deg)}
.seal-anim.phase-seal .wax{transform:translateX(-50%) scale(1.25) translateY(8px);animation:waxDrop .5s var(--spring)}
@keyframes waxDrop{from{transform:translateX(-50%) translateY(-30px) scale(.8);opacity:0}to{transform:translateX(-50%) scale(1.25) translateY(0);opacity:1}}
.seal-anim.phase-glow .envelope{filter:drop-shadow(0 0 30px rgba(255,122,107,.5))}
.seal-anim.phase-fly .envelope{transform:translateY(-120vh) scale(.25) rotate(12deg);opacity:0}
.seal-anim .msg{color:rgba(255,255,255,.75);font-size:15px;margin-top:36px;opacity:0;transition:opacity .5s .2s}
.seal-anim.phase-fly .msg{opacity:1}

/* Inbox */
.notif-list{padding:8px 24px 0;display:flex;flex-direction:column;gap:12px}
.notif-card{
  padding:22px;border-radius:var(--r);background:var(--card);
  box-shadow:var(--shadow);position:relative;transition:transform .3s var(--spring);
}
.notif-card.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ink);border-radius:4px 0 0 4px}
.notif-card:active{transform:scale(.98)}
.notif-card .icon{font-size:26px;margin-bottom:8px}
.notif-card .poetic{font-size:16px;font-weight:600;line-height:1.45}
.notif-card .detail{font-size:14px;color:var(--ink-2);margin-top:8px;line-height:1.55}
.notif-card .time{font-size:12px;color:var(--ink-3);margin-top:10px}
.notif-card .open-btn{
  display:inline-block;margin-top:14px;padding:10px 24px;border-radius:var(--r-pill);
  background:var(--navy);color:#fff;font-size:13px;font-weight:600;
}

/* Group sync */
.group-sync{
  margin:16px 24px 0;padding:22px;border-radius:var(--r);
  background:linear-gradient(160deg,var(--navy),var(--navy-2));
  color:#F5F3EF;box-shadow:var(--shadow-lg);text-align:center;
}
.group-sync .status{font-size:14px;opacity:.7}
.group-sync .online{font-size:28px;font-weight:700;margin:12px 0 4px}
.group-sync .countdown{font-size:48px;font-weight:700;color:var(--accent-inv);margin:16px 0;letter-spacing:-.02em}
.group-sync .sync-btn{
  margin-top:12px;padding:12px 28px;border-radius:var(--r-pill);
  background:var(--accent-inv);color:var(--ink);font-size:14px;font-weight:700;
}

/* Profile */
.profile-header{padding:16px 24px;text-align:center}
.profile-avatar{
  width:88px;height:88px;border-radius:50%;margin:0 auto;
  background:var(--ink);
  display:grid;place-items:center;font-size:28px;font-weight:700;color:var(--accent-inv);
  box-shadow:var(--shadow-lg);
}
.profile-name{font-size:22px;font-weight:700;margin-top:14px}
.profile-bio{font-size:13px;color:var(--ink-2);margin-top:6px;line-height:1.5}
.stats-row{display:flex;gap:10px;padding:20px 24px 0}
.stat-card{flex:1;padding:18px 10px;border-radius:var(--r-sm);background:var(--card);box-shadow:var(--shadow);text-align:center}
.stat-card .n{font-size:26px;font-weight:700;color:var(--ink)}
.stat-card .l{font-size:11px;color:var(--ink-3);margin-top:2px}
.group-section{padding:24px}
.group-section h3{font-size:12px;font-weight:600;color:var(--ink-3);letter-spacing:.06em;margin-bottom:12px}
.member-row{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.member-chip{flex-shrink:0;width:72px;text-align:center}
.member-chip .av{width:52px;height:52px;border-radius:50%;margin:0 auto;display:grid;place-items:center;font-size:16px;font-weight:600;color:#fff;box-shadow:var(--shadow)}
.member-chip .name{font-size:12px;font-weight:600;margin-top:6px}
.member-chip .cnt{font-size:10px;color:var(--ink-3)}
.settings-row{margin:0 24px;padding:16px 20px;border-radius:var(--r-sm);background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between}
.toggle{width:52px;height:32px;border-radius:99px;background:var(--bg-2);position:relative;transition:background .3s}
.toggle.on{background:var(--ink)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:transform .35s var(--spring)}
.toggle.on::after{transform:translateX(20px)}

/* Opening */
.opening{position:fixed;inset:0;z-index:400;background:var(--navy);display:none;flex-direction:column;overflow:hidden}
.opening.active{display:flex}
.opening.flash{animation:screenFlash .4s ease}
@keyframes screenFlash{0%,100%{filter:none}50%{filter:brightness(2)}}
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;opacity:.4;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}
.particles{position:absolute;inset:0;pointer-events:none}
.particle{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.35);animation:float 8s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0);opacity:0}10%,90%{opacity:.5}100%{transform:translateY(-100vh);opacity:0}}
.opening-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
.opening-poetic{text-align:center;color:rgba(255,255,255,.9);font-size:18px;font-weight:600;line-height:1.55;margin-bottom:36px;max-width:300px;animation:fadeUp .8s var(--spring) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.opening-envelope{width:200px;height:140px;position:relative;animation:envFloat 4s ease-in-out infinite}
@keyframes envFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.opening-envelope .body{width:100%;height:110px;background:linear-gradient(180deg,#F5E6D3,#E8D4BC);border-radius:12px 12px 16px 16px;position:absolute;bottom:0;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.opening-envelope .flap{width:0;height:0;position:absolute;top:30px;left:50%;border-left:100px solid transparent;border-right:100px solid transparent;border-top:70px solid #EDD9C0;transform:translateX(-50%);transform-origin:top center;transition:transform 1s var(--spring)}
.opening-envelope.opened .flap{transform:translateX(-50%) rotateX(180deg)}
.drag-seal{width:52px;height:52px;border-radius:50%;cursor:grab;background:radial-gradient(circle at 35% 35%,#E85A4A,#B84A3A);position:absolute;top:70px;left:50%;transform:translateX(-50%);box-shadow:0 6px 20px rgba(184,74,58,.55);touch-action:none;user-select:none;transition:opacity .3s}
.drag-seal::after{content:'↑';color:rgba(255,255,255,.6);font-size:13px;position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);animation:bounce 1.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
.drag-seal.hidden{opacity:0;pointer-events:none}
.opening-hint{color:rgba(255,255,255,.4);font-size:13px;margin-top:44px}
.reveal-stack{display:none;flex-direction:column;gap:14px;width:100%;max-width:340px;max-height:48vh;overflow-y:auto}
.reveal-stack.show{display:flex}
.reveal-item{padding:20px;border-radius:var(--r-sm);background:rgba(255,255,255,.08);backdrop-filter:blur(12px);color:#fff;animation:revealIn .7s var(--spring) both}
@keyframes revealIn{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:none}}
.reveal-item .from{font-size:12px;opacity:.55;margin-bottom:6px}
.reveal-item .text{font-size:15px;line-height:1.6}
.reveal-item.photo .thumb{width:100%;height:120px;border-radius:14px;margin-top:10px;background:linear-gradient(135deg,var(--blue),var(--sage));display:grid;place-items:center;font-size:28px;animation:photoZoom 4s ease-in-out infinite}
@keyframes photoZoom{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.reveal-item.voice .wave{display:flex;align-items:flex-end;gap:3px;height:32px;margin-top:10px}
.reveal-item.voice .wave span{width:4px;border-radius:2px;background:var(--coral);animation:wave 1s ease-in-out infinite}
.reveal-item.voice .wave span:nth-child(2){animation-delay:.1s}
.reveal-item.voice .wave span:nth-child(3){animation-delay:.2s}
.reveal-item.voice .wave span:nth-child(4){animation-delay:.15s}
.reveal-item.voice .wave span:nth-child(5){animation-delay:.25s}
@keyframes wave{0%,100%{height:30%}50%{height:100%}}
.opening-close{position:absolute;top:calc(14px + var(--safe-t));right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:18px;display:grid;place-items:center;z-index:2}
.reactions{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;opacity:0;transition:opacity .5s .4s}
.reactions.show{opacity:1}
.reaction-btn{padding:10px 16px;border-radius:var(--r-pill);background:rgba(255,255,255,.1);font-size:13px;color:#fff;transition:transform .25s var(--spring)}
.reaction-btn:active{transform:scale(1.08)}

.export-btn{
  margin-top:16px;padding:14px 28px;border-radius:var(--r-pill);
  background:var(--accent-inv);color:var(--ink);
  font-size:14px;font-weight:700;
  opacity:0;transition:opacity .5s .6s;
}
.export-btn.show{opacity:1}

.everyone-overlay{
  position:fixed;inset:0;z-index:450;background:rgba(13,17,23,.92);
  display:none;align-items:center;justify-content:center;flex-direction:column;
  color:#fff;text-align:center;padding:24px;
}
.everyone-overlay.active{display:flex}
.everyone-overlay h2{font-size:28px;font-weight:700;animation:fadeUp .6s var(--spring) both}
.everyone-overlay p{font-size:15px;opacity:.65;margin-top:10px}

.reveal-item .text.typewriter{overflow:hidden;white-space:pre-wrap}
.archive-list{padding:8px 24px 0;display:flex;flex-direction:column;gap:10px}
.archive-card{
  padding:18px;border-radius:var(--r-sm);background:var(--card);
  box-shadow:var(--shadow);
}
.archive-card .date{font-size:11px;color:var(--ink-3)}
.archive-card .text{font-size:15px;margin-top:6px;line-height:1.5}
.streak-card{
  margin:20px 24px 0;padding:20px;border-radius:var(--r);
  background:var(--bg-2);
  box-shadow:var(--shadow);text-align:center;border:1px solid var(--bg-3);
}
.streak-card .n{font-size:36px;font-weight:700;color:var(--ink)}
.streak-card .l{font-size:13px;color:var(--ink-2);margin-top:4px}
.day0-banner{
  margin:12px 24px 0;padding:14px 18px;border-radius:var(--r-sm);
  background:var(--ink);
  color:var(--accent-inv);font-size:13px;font-weight:600;line-height:1.45;
}
.future-pending{margin:16px 24px 0;padding:16px 18px;border-radius:var(--r-sm);background:var(--card);box-shadow:var(--shadow)}
.future-pending .n{font-size:22px;font-weight:700;color:var(--ink)}
.future-pending .l{font-size:12px;color:var(--ink-3);margin-top:2px}

/* Media picker */
.media-preview{
  display:none;margin-bottom:16px;border-radius:var(--r-sm);overflow:hidden;
  background:var(--card);box-shadow:var(--shadow);position:relative;
}
.media-preview.show{display:block}
.media-preview img,.media-preview video{
  width:100%;max-height:220px;object-fit:cover;display:block;
}
.media-preview .remove{
  position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.5);color:#fff;font-size:16px;
}
.media-pick-btn{
  width:100%;padding:14px;border-radius:var(--r-sm);margin-bottom:12px;
  background:var(--card);box-shadow:var(--shadow);
  font-size:14px;font-weight:600;color:var(--ink);border:1px solid var(--bg-3);
}
.voice-rec{
  display:none;padding:20px;border-radius:var(--r-sm);background:var(--card);
  box-shadow:var(--shadow);text-align:center;margin-bottom:16px;
}
.voice-rec.show{display:block}
.voice-rec .rec-dot{
  width:12px;height:12px;border-radius:50%;background:#E85545;margin:0 auto 10px;
  animation:recPulse 1s ease-in-out infinite;
}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Timeline feed */
.timeline-feed{padding:0 24px 32px;display:flex;flex-direction:column;gap:10px}
.tl-item{
  padding:16px 18px;border-radius:var(--r-sm);background:var(--card);
  box-shadow:var(--shadow);display:flex;gap:14px;align-items:center;
  transition:transform .2s var(--spring);
}
.tl-item:active{transform:scale(.98)}
.tl-item.ready{box-shadow:var(--shadow),0 0 0 2px var(--ink-4)}
.tl-thumb{
  width:56px;height:56px;border-radius:14px;flex-shrink:0;
  background:var(--bg-2);display:grid;place-items:center;font-size:22px;
  overflow:hidden;position:relative;
}
.tl-thumb img{width:100%;height:100%;object-fit:cover}
.tl-thumb.blurred img,.tl-thumb.blurred .tl-placeholder{filter:blur(10px);transform:scale(1.1)}
.tl-thumb.semi img,.tl-thumb.semi .tl-placeholder{filter:blur(5px);opacity:.7}
.tl-body{flex:1;min-width:0}
.tl-body .tl-from{font-size:15px;font-weight:600}
.tl-body .tl-meta{font-size:12px;color:var(--ink-3);margin-top:3px}
.tl-badge{
  font-size:10px;font-weight:700;padding:4px 10px;border-radius:999px;
  background:var(--bg-3);color:var(--ink-2);flex-shrink:0;
}
.tl-badge.open{background:var(--ink);color:var(--accent-inv)}
.opened-timeline .tl-item .tl-thumb img{filter:none!important;transform:none!important}
.reveal-item .thumb img,.reveal-item .thumb video{width:100%;height:160px;object-fit:cover;border-radius:14px}
.archive-card .thumb img{width:100%;height:100px;object-fit:cover;border-radius:12px;margin-top:8px}

/* Nav — BeReal floating bar */
.nav-wrap{
  position:fixed;bottom:calc(6px + var(--safe-b));left:50%;transform:translateX(-50%);
  width:calc(100% - 20px);max-width:410px;z-index:100;
}
.nav-bar{
  height:var(--nav-h);padding:6px 8px 10px;
  background:var(--glass);backdrop-filter:blur(40px) saturate(1.4);-webkit-backdrop-filter:blur(40px) saturate(1.4);
  border-radius:28px;box-shadow:0 0 0 1px rgba(255,255,255,.06),var(--shadow-lg);
  display:flex;align-items:flex-end;justify-content:space-around;position:relative;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:6px 2px;font-size:10px;font-weight:500;color:var(--ink-3);
  transition:color .2s,transform .2s var(--spring);min-width:0;
}
.nav-btn svg{width:24px;height:24px;stroke-width:1.6}
.nav-btn.active{color:var(--ink)}
.nav-btn.active svg{stroke-width:2}
.nav-btn:active{transform:scale(.9)}
.nav-create{
  position:relative;top:-18px;
  width:58px;height:58px;border-radius:50%;flex-shrink:0;
  background:var(--accent);box-shadow:0 4px 20px rgba(255,255,255,.15);
  display:grid;place-items:center;color:var(--accent-inv);margin:0 4px;
}
.nav-create:active{transform:scale(.92)}
.nav-create svg{width:28px;height:28px;stroke-width:2}
.nav-unread{
  position:absolute;top:2px;right:8px;min-width:16px;height:16px;padding:0 4px;
  border-radius:999px;background:var(--red);color:#fff;font-size:9px;font-weight:700;
  display:grid;place-items:center;
}

.toast{
  position:fixed;top:calc(56px + var(--safe-t));left:50%;
  transform:translateX(-50%) translateY(-12px);
  padding:13px 22px;border-radius:var(--r-pill);
  background:var(--card);font-size:14px;font-weight:500;z-index:500;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;
  transition:opacity .35s,transform .35s var(--spring);
  max-width:calc(100% - 48px);text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-state{padding:48px 24px;text-align:center;color:var(--ink-3);font-size:14px;line-height:1.7}

/* BeReal / Retro home */
.br-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(10px + var(--safe-t)) 20px 8px;
  position:sticky;top:0;z-index:30;background:var(--bg);
}
.br-header-btn{
  width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
  background:transparent;color:var(--ink);
}
.br-header-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.75}
.br-logo{
  font-family:var(--font-sans);font-size:18px;font-weight:700;letter-spacing:-.02em;
  color:var(--ink);
}
.br-feed-tabs{
  display:flex;gap:24px;justify-content:center;padding:4px 20px 12px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.br-tab{
  font-size:15px;font-weight:600;color:var(--ink-3);padding-bottom:8px;
  position:relative;transition:color .2s;
}
.br-tab.on{color:var(--ink)}
.br-tab.on::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--ink);border-radius:1px;
}
.br-composer{
  margin:12px 16px;padding:14px;border-radius:var(--r);
  background:var(--bg-2);border:1px solid rgba(255,255,255,.06);
}
.br-composer-actions{display:flex;align-items:center;gap:8px;margin-top:10px}
.br-icon-btn{
  width:40px;height:40px;border-radius:50%;background:var(--bg-3);
  font-size:18px;display:grid;place-items:center;
}
.br-icon-btn.has-media{background:rgba(255,255,255,.15)}
.br-post-btn{
  margin-left:auto;padding:10px 22px;border-radius:var(--r-pill);
  background:var(--accent);color:var(--accent-inv);
  font-size:14px;font-weight:700;
}
.home-topbar{display:none}
.quick-capture{border:none;background:transparent;padding:0;margin:0}
.qc-header{margin-bottom:10px}
.qc-label{font-size:13px;font-weight:600;color:var(--ink-2)}
.qc-friends{font-size:12px;color:var(--ink-3)}
.qc-text{
  width:100%;border:none;outline:none;resize:none;min-height:64px;
  font-size:16px;line-height:1.5;background:transparent;
  padding:0;color:var(--ink);
}
.qc-text::placeholder{color:var(--ink-3)}
.qc-dual{display:none}
.qc-footer{display:none}
.qc-preview{margin-top:12px;border-radius:var(--r-sm);overflow:hidden;position:relative}
.qc-preview img,.qc-preview video{width:100%;max-height:220px;object-fit:cover;display:block;border-radius:var(--r-sm)}
.qc-preview-remove{
  position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,.6);color:#fff;font-size:15px;z-index:2;
}
.notif-bell{
  position:relative;width:40px;height:40px;border-radius:50%;
  background:transparent;display:grid;place-items:center;
}
.notif-bell svg{width:24px;height:24px;stroke:var(--ink);fill:none;stroke-width:1.75}
.notif-badge{
  position:absolute;top:4px;right:4px;min-width:17px;height:17px;padding:0 4px;
  border-radius:999px;background:var(--red);color:#fff;
  font-size:10px;font-weight:700;display:grid;place-items:center;
  border:2px solid var(--bg);
}
.notif-dropdown{
  position:fixed;top:calc(54px + var(--safe-t));right:max(12px,calc(50% - 203px));
  width:min(340px,calc(100% - 24px));max-height:min(480px,65dvh);
  background:var(--bg-2);border-radius:var(--r);box-shadow:var(--shadow-lg);
  z-index:150;overflow:hidden;display:none;flex-direction:column;
  border:1px solid rgba(255,255,255,.08);
}
.friends-feed{padding:8px 16px 0}
.feed-label{display:none}
.br-post{margin-bottom:28px}
.br-post-head{display:flex;align-items:center;gap:10px;padding:0 4px 12px}
.br-post-av{
  width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
  font-size:14px;font-weight:600;color:#fff;flex-shrink:0;
}
.br-post-name{font-size:15px;font-weight:600}
.br-post-time{font-size:13px;color:var(--ink-3);margin-top:1px}
.br-post-menu{margin-left:auto;color:var(--ink-3);font-size:18px;letter-spacing:2px;padding:4px 8px}
.br-post-body{
  position:relative;border-radius:var(--r);overflow:hidden;
  aspect-ratio:3/4;max-height:480px;background:var(--bg-2);
}
.br-post-body img,.br-post-body video{width:100%;height:100%;object-fit:cover;display:block}
.br-post-body.blurred img,.br-post-body.blurred video{filter:blur(24px);transform:scale(1.05)}
.br-post-body.semi img,.br-post-body.semi video{filter:blur(10px);opacity:.8}
.br-lock-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:24px;
  background:rgba(0,0,0,.35);
}
.br-lock-icon{font-size:32px;margin-bottom:12px;opacity:.9}
.br-lock-title{font-size:17px;font-weight:700;margin-bottom:6px}
.br-lock-sub{font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:20px;max-width:240px}
.br-cta-white{
  padding:14px 28px;border-radius:var(--r-pill);
  background:var(--accent);color:var(--accent-inv);
  font-size:15px;font-weight:700;
}
.br-post-text{
  padding:24px;border-radius:var(--r);background:var(--bg-2);
  font-size:17px;line-height:1.55;min-height:140px;
}
.br-post-text.blurred,.br-post-text.semi{filter:blur(8px);opacity:.4;user-select:none}
.br-post-caption{padding:12px 4px 0;font-size:15px;line-height:1.5;color:var(--ink-2)}
.br-post-badge{
  font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;
  background:var(--bg-3);color:var(--ink-2);margin-left:auto;flex-shrink:0;
}
.feed-card{display:none}
.home-extra{
  margin:8px 16px;border-radius:var(--r);background:var(--bg-2);
  border:1px solid rgba(255,255,255,.06);overflow:hidden;
}
.home-extra summary{padding:14px 16px;font-size:13px;font-weight:600;color:var(--ink-3)}
.prompt-glass{
  margin:12px 16px;padding:18px;border-radius:var(--r);
  background:var(--bg-2);border:1px solid rgba(255,255,255,.06);
}
.prompt-glass .label{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--ink-3);text-transform:uppercase}
.prompt-glass .text{font-family:var(--font-display);font-size:20px;font-weight:600;margin-top:8px;line-height:1.35}
.prompt-glass .hint{font-size:13px;color:var(--ink-3);margin-top:8px}
.friends-pulse{
  margin:12px 16px;padding:14px 16px;border-radius:var(--r);
  background:var(--bg-2);border:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:12px;
}
.quorum-bar,.day0-banner{
  margin:8px 16px;padding:12px 14px;border-radius:var(--r-sm);
  background:var(--bg-2);font-size:12px;color:var(--ink-2);line-height:1.45;
  border:1px solid rgba(255,255,255,.06);
}
.day0-banner{background:var(--accent);color:var(--accent-inv);font-weight:600;border:none}
.sec-label{
  padding:24px 20px 10px;font-size:11px;font-weight:700;
  color:var(--ink-3);letter-spacing:.12em;text-transform:uppercase;
}
.timeline-feed{padding:0 16px}
.tl-item{
  padding:14px;border-radius:var(--r-sm);background:var(--bg-2);
  border:1px solid rgba(255,255,255,.05);
}
.tl-badge.open{background:var(--accent);color:var(--accent-inv)}
.toast{
  background:var(--bg-2);border:1px solid rgba(255,255,255,.1);
  color:var(--ink);font-weight:600;
}
.notif-dropdown.open{display:flex;animation:panelIn .3s var(--spring) both}
.notif-dropdown-header{padding:16px 18px 12px;font-size:15px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.06)}
.notif-dropdown-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.notif-drop-item{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
.notif-drop-item.unread{background:rgba(255,255,255,.04)}
.notif-drop-item .nd-title{font-size:14px;font-weight:600}
.notif-drop-item .nd-sub{font-size:12px;color:var(--ink-3);margin-top:4px}
.home-extra summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between}
.home-extra summary::after{content:'▼';font-size:10px;opacity:.4}
.home-extra[open] summary::after{transform:rotate(180deg)}
.pill-scroll{padding:12px 16px;display:flex;gap:10px;overflow-x:auto}
.pill-card{background:var(--bg-3);border:1px solid rgba(255,255,255,.06);box-shadow:none}

/* Retro Activity / Inbox */
.panel-head{padding:calc(12px + var(--safe-t)) 20px 16px}
.panel-head h1{font-family:var(--font-display);font-size:32px;font-weight:700;letter-spacing:-.02em}
.panel-head .sub{font-size:14px;color:var(--ink-3);margin-top:4px}
.filter-chips{display:flex;gap:8px;padding:0 20px 16px;overflow-x:auto}
.filter-chip{
  padding:8px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:600;
  background:var(--bg-2);color:var(--ink-2);white-space:nowrap;flex-shrink:0;
  border:1px solid rgba(255,255,255,.06);
}
.filter-chip.on{background:var(--accent);color:var(--accent-inv);border-color:var(--accent)}
.act-item{
  display:flex;align-items:flex-start;gap:12px;padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.act-av{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:15px;font-weight:600;color:#fff;flex-shrink:0}
.act-body{flex:1;min-width:0}
.act-body .act-text{font-size:14px;line-height:1.45}
.act-body .act-text strong{font-weight:600}
.act-body .act-time{font-size:12px;color:var(--ink-3);margin-top:4px}
.act-thumb{width:48px;height:48px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--bg-3)}
.act-thumb img{width:100%;height:100%;object-fit:cover}

/* Chat panel */
.chat-search{
  margin:0 20px 12px;padding:12px 16px;border-radius:var(--r-pill);
  background:var(--bg-2);display:flex;align-items:center;gap:10px;
  border:1px solid rgba(255,255,255,.06);
}
.chat-search input{flex:1;border:none;outline:none;background:transparent;font-size:15px;color:var(--ink)}
.chat-search input::placeholder{color:var(--ink-3)}
.chat-search svg{width:18px;height:18px;stroke:var(--ink-3);fill:none}

/* Memories / Capsules — Retro grid */
.mem-week{padding:0 20px 24px}
.shelf-wrap{display:none}
.mem-week-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.mem-week-head h2{font-family:var(--font-display);font-size:26px;font-weight:700}
.mem-week-head span{font-size:13px;color:var(--ink-3)}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mem-cell{
  aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--bg-2);
  position:relative;border:1px solid rgba(255,255,255,.04);
}
.mem-cell img{width:100%;height:100%;object-fit:cover}
.mem-cell .day{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.mem-cell.empty{display:grid;place-items:center;font-size:11px;color:var(--ink-4)}
.vault-hero{background:var(--bg-2);border:1px solid rgba(255,255,255,.06);margin:0 20px}
.shelf-layer{background:var(--bg-2);border:1px solid rgba(255,255,255,.06);box-shadow:none}
.stat-card,.auth-card,.dm-entry-btn,.settings-row,.future-pending,.streak-card{
  background:var(--bg-2);border:1px solid rgba(255,255,255,.06);box-shadow:none;
}
.profile-avatar{width:96px;height:96px;border-radius:22px;font-size:32px}
.profile-header .profile-name{font-size:24px;font-weight:700}
.create-overlay{background:rgba(0,0,0,.75)}
.create-sheet{background:var(--bg);border:1px solid rgba(255,255,255,.08)}
.create-title{font-family:var(--font-display);font-size:28px}
.dest-toggle{background:var(--bg-2)}
.seal-cta{background:var(--accent);color:var(--accent-inv)}
.dm-overlay{background:rgba(0,0,0,.8)}
.dm-panel{background:var(--bg)}
.group-sync{background:var(--bg-2);border:1px solid rgba(255,255,255,.06)}
.notif-card{background:var(--bg-2);border:1px solid rgba(255,255,255,.05)}
.archive-card,.pending-row{background:var(--bg-2);border:1px solid rgba(255,255,255,.05)}

/* Auth */
.auth-card{
  margin:16px 24px 0;padding:22px;border-radius:var(--r);
  background:var(--card);box-shadow:var(--shadow);border:1px solid var(--bg-3);
}
.auth-card h3{font-size:16px;font-weight:700;margin-bottom:4px}
.auth-card .auth-sub{font-size:12px;color:var(--ink-3);margin-bottom:16px}
.auth-tabs{display:flex;gap:6px;margin-bottom:16px;padding:4px;background:var(--bg-2);border-radius:var(--r-pill)}
.auth-tabs button{
  flex:1;padding:9px;border-radius:var(--r-pill);font-size:13px;font-weight:600;color:var(--ink-3);
}
.auth-tabs button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:11px;font-weight:600;color:var(--ink-3);margin-bottom:6px;letter-spacing:.04em}
.auth-field input{
  width:100%;padding:13px 16px;border-radius:var(--r-sm);border:1px solid var(--bg-3);
  background:var(--bg-2);font-size:15px;outline:none;
}
.auth-field input:focus{border-color:var(--ink-3)}
.auth-submit{
  width:100%;padding:15px;border-radius:var(--r-pill);
  background:var(--ink);color:var(--accent-inv);
  font-size:14px;font-weight:700;margin-top:4px;
}
.auth-logged{display:flex;align-items:center;gap:14px}
.auth-logged .auth-av{
  width:48px;height:48px;border-radius:50%;background:var(--ink);
  color:var(--accent-inv);display:grid;place-items:center;font-size:18px;font-weight:700;
}
.auth-logged .auth-info{flex:1}
.auth-logged .auth-email{font-size:12px;color:var(--ink-3);margin-top:2px}
.auth-logout{
  padding:8px 14px;border-radius:var(--r-pill);font-size:12px;font-weight:600;
  background:var(--bg-2);color:var(--ink-2);
}

.dm-entry-btn{
  display:flex;align-items:center;justify-content:space-between;
  margin:16px 24px 0;padding:16px 18px;border-radius:var(--r-sm);
  background:var(--card);box-shadow:var(--shadow);width:calc(100% - 48px);
  border:1px solid var(--bg-3);
}
.dm-entry-btn .dm-left{display:flex;align-items:center;gap:12px}
.dm-entry-btn .dm-icon{
  width:40px;height:40px;border-radius:12px;background:var(--bg-2);
  display:grid;place-items:center;font-size:18px;
}
.dm-entry-btn .dm-title{font-size:15px;font-weight:600;text-align:left}
.dm-entry-btn .dm-sub{font-size:12px;color:var(--ink-3);text-align:left}
.dm-entry-btn .dm-unread{
  min-width:22px;height:22px;border-radius:999px;background:var(--ink);color:var(--accent-inv);
  font-size:11px;font-weight:700;display:grid;place-items:center;padding:0 6px;
}

.dm-overlay{
  position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.45);
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.dm-overlay.open{opacity:1;pointer-events:auto}
.dm-panel{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:430px;height:min(88dvh,720px);
  background:var(--bg);border-radius:var(--r) var(--r) 0 0;
  display:flex;flex-direction:column;transition:transform .45s var(--spring);
  box-shadow:0 -20px 60px rgba(0,0,0,.15);
}
.dm-overlay.open .dm-panel{transform:translateX(-50%) translateY(0)}
.dm-header{
  padding:16px 20px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--bg-2);flex-shrink:0;
}
.dm-header h2{font-size:17px;font-weight:700;flex:1}
.dm-close{width:36px;height:36px;border-radius:50%;background:var(--bg-2);font-size:18px}
.dm-back{width:36px;height:36px;border-radius:50%;background:var(--bg-2);font-size:16px}
.dm-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0}
.dm-thread{
  display:flex;align-items:center;gap:14px;padding:14px 20px;
  transition:background .2s;cursor:pointer;
}
.dm-thread:active{background:var(--bg-2)}
.dm-thread .dm-av{
  width:48px;height:48px;border-radius:50%;background:var(--ink-2);
  color:#fff;display:grid;place-items:center;font-size:16px;font-weight:600;flex-shrink:0;
}
.dm-thread .dm-body{flex:1;min-width:0}
.dm-thread .dm-name{font-size:15px;font-weight:600}
.dm-thread .dm-preview{font-size:13px;color:var(--ink-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-thread .dm-time{font-size:11px;color:var(--ink-4);flex-shrink:0}
.dm-chat{flex:1;display:flex;flex-direction:column;min-height:0}
.dm-messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.dm-bubble{
  max-width:78%;padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.45;
}
.dm-bubble.them{background:var(--bg-2);color:var(--ink);align-self:flex-start;border-bottom-left-radius:4px}
.dm-bubble.me{background:var(--ink);color:var(--accent-inv);align-self:flex-end;border-bottom-right-radius:4px}
.dm-input-row{
  padding:12px 16px calc(12px + var(--safe-b));display:flex;gap:8px;
  border-top:1px solid var(--bg-2);flex-shrink:0;
}
.dm-input{
  flex:1;padding:12px 16px;border-radius:var(--r-pill);border:none;
  background:var(--bg-2);font-size:14px;outline:none;
}
.dm-send{
  width:44px;height:44px;border-radius:50%;background:var(--ink);color:var(--accent-inv);
  font-size:16px;flex-shrink:0;
}

/* ── 3-Tab Architecture ── */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(10px + var(--safe-t)) 20px 12px;position:sticky;top:0;z-index:30;
  background:var(--bg);
}
.app-logo{font-size:17px;font-weight:600;letter-spacing:-.02em;color:var(--ink)}
.app-header-actions{display:flex;gap:4px;align-items:center}
.icon-btn{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;color:var(--ink)}
.icon-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6}
.fab-compose{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);right:20px;
  width:52px;height:52px;border-radius:50%;background:var(--accent);color:var(--accent-inv);
  box-shadow:var(--shadow-lg);font-size:24px;z-index:90;display:grid;place-items:center;
}
.tab-nav-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding-bottom:var(--safe-b);background:var(--bg);
  border-top:1px solid rgba(255,255,255,.06);
}
.tab-nav{
  max-width:430px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;
  height:var(--nav-h);
}
.tab-nav button{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  font-size:11px;font-weight:500;color:var(--ink-3);letter-spacing:.02em;
}
.tab-nav button svg{width:22px;height:22px;stroke-width:1.6}
.tab-nav button.active{color:var(--ink)}
.tab-nav button.active svg{stroke-width:2}

/* Private cards */
.private-list{padding:8px 20px 100px;display:flex;flex-direction:column;gap:16px}
.private-card{
  padding:22px 20px;border-radius:var(--r);background:var(--bg-2);
  border:1px solid rgba(255,255,255,.05);position:relative;
}
.private-card .pc-date{font-size:12px;color:var(--ink-3);font-weight:400}
.private-card .pc-text{font-size:16px;line-height:1.55;margin-top:10px;font-weight:400}
.private-card .pc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.state-pill{
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:5px 10px;border-radius:999px;
}
.state-pill.locked{background:rgba(255,255,255,.06);color:var(--ink-3)}
.state-pill.waiting{background:rgba(255,255,255,.12);color:var(--ink);animation:pulseWait 2s ease infinite}
.state-pill.opened{background:var(--accent);color:var(--accent-inv)}
@keyframes pulseWait{0%,100%{opacity:1}50%{opacity:.65}}
.private-card .pc-open{font-size:12px;color:var(--ink-3)}
.private-card .pc-thumb{margin-top:14px;border-radius:12px;overflow:hidden;max-height:160px}
.private-card .pc-thumb img,.private-card .pc-thumb video{width:100%;object-fit:cover;display:block}

/* Shared */
.shared-list{padding:0 20px 100px}
.friend-row{
  display:flex;align-items:center;gap:14px;padding:16px 0;
  border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;
}
.friend-row:active{opacity:.7}
.friend-row .fr-av{
  width:52px;height:52px;border-radius:50%;display:grid;place-items:center;
  font-size:18px;font-weight:500;color:#fff;flex-shrink:0;
}
.friend-row .fr-body{flex:1;min-width:0}
.friend-row .fr-name{font-size:16px;font-weight:500}
.friend-row .fr-sub{font-size:13px;color:var(--ink-3);margin-top:3px}
.friend-row .fr-badge{font-size:11px;color:var(--ink-3);flex-shrink:0}

.friend-space{display:none;flex-direction:column;min-height:calc(100dvh - var(--nav-h))}
.friend-space.active{display:flex}
.shared-list.hidden{display:none}
.fs-top{padding:8px 20px 0;display:flex;align-items:center;gap:12px}
.fs-back{width:36px;height:36px;border-radius:50%;background:var(--bg-2);font-size:18px}
.fs-head{flex:1}
.fs-head .fs-name{font-size:20px;font-weight:600}
.fs-head .fs-sub{font-size:13px;color:var(--ink-3);margin-top:2px}
.fs-tabs{display:flex;gap:20px;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.fs-tab{font-size:14px;font-weight:500;color:var(--ink-3);padding-bottom:8px;position:relative}
.fs-tab.on{color:var(--ink)}
.fs-tab.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ink)}
.fs-content{flex:1;padding:16px 20px 120px;overflow-y:auto}
.fs-posts{display:flex;flex-direction:column;gap:12px}
.fs-post{
  padding:16px;border-radius:var(--r-sm);background:var(--bg-2);
  border:1px solid rgba(255,255,255,.04);
}
.fs-post .fp-when{font-size:12px;color:var(--ink-3)}
.fs-post .fp-text{font-size:15px;margin-top:8px;line-height:1.5}

/* Future DM */
.future-dm-list{display:flex;flex-direction:column;gap:10px}
.fdm-bubble{max-width:85%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.45}
.fdm-bubble.me{align-self:flex-end;background:var(--accent);color:var(--accent-inv);border-bottom-right-radius:4px}
.fdm-bubble.them{align-self:flex-start;background:var(--bg-2);border-bottom-left-radius:4px}
.fdm-bubble.sealed{
  align-self:flex-start;background:var(--bg-3);color:var(--ink-3);
  border:1px dashed rgba(255,255,255,.12);font-style:italic;
}
.fdm-compose{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-b));left:0;right:0;
  padding:12px 16px;background:var(--bg);border-top:1px solid rgba(255,255,255,.06);
  max-width:430px;margin:0 auto;
}
.fdm-compose.hidden{display:none}
.fdm-delay{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto}
.fdm-delay button{
  padding:6px 12px;border-radius:999px;font-size:11px;font-weight:500;
  background:var(--bg-2);color:var(--ink-3);white-space:nowrap;flex-shrink:0;
  border:1px solid rgba(255,255,255,.06);
}
.fdm-delay button.on{background:var(--accent);color:var(--accent-inv);border-color:var(--accent)}
.fdm-input-row{display:flex;gap:8px}
.fdm-input{
  flex:1;padding:12px 16px;border-radius:var(--r-pill);border:none;
  background:var(--bg-2);font-size:14px;outline:none;color:var(--ink);
}
.fdm-send{width:44px;height:44px;border-radius:50%;background:var(--accent);color:var(--accent-inv);font-size:16px}

/* Archive */
.archive-view{padding:0 20px 100px}
.archive-month{font-family:var(--font-display);font-size:28px;font-weight:600;margin-bottom:16px}
.archive-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:32px}
.archive-cell{
  aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--bg-2);
  position:relative;border:1px solid rgba(255,255,255,.04);
}
.archive-cell img{width:100%;height:100%;object-fit:cover}
.archive-cell .ac-day{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:10px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.archive-cell.text-cell{padding:8px;font-size:9px;line-height:1.3;color:var(--ink-2);display:grid;place-items:center;text-align:center}
.archive-log{display:flex;flex-direction:column;gap:10px}
.archive-log-item{
  padding:14px 16px;border-radius:var(--r-sm);background:var(--bg-2);
  border:1px solid rgba(255,255,255,.04);display:flex;gap:12px;align-items:center;
}
.archive-log-item .ali-thumb{width:48px;height:48px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--bg-3)}
.archive-log-item .ali-thumb img{width:100%;height:100%;object-fit:cover}
.archive-log-item .ali-body{flex:1;min-width:0}
.archive-log-item .ali-title{font-size:14px;font-weight:500}
.archive-log-item .ali-sub{font-size:12px;color:var(--ink-3);margin-top:2px}

.settings-overlay{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.settings-overlay.open{opacity:1;pointer-events:auto}
.settings-panel{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:430px;max-height:90dvh;overflow-y:auto;
  background:var(--bg);border-radius:var(--r) var(--r) 0 0;
  padding:20px 20px calc(24px + var(--safe-b));transition:transform .45s var(--spring);
}
.settings-overlay.open .settings-panel{transform:translateX(-50%) translateY(0)}
.nav-wrap,.br-header,.br-feed-tabs{display:none!important}
.create-friend-pick{margin-bottom:14px}
.create-friend-pick.hidden{display:none}
.create-friend-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.create-friend-chip{
  padding:8px 14px;border-radius:999px;font-size:13px;font-weight:500;
  background:var(--bg-2);color:var(--ink-2);border:1px solid rgba(255,255,255,.06);
}
.create-friend-chip.on{background:var(--accent);color:var(--accent-inv);border-color:var(--accent)}
</style>
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="app-logo">Time Cap</div>
    <div class="app-header-actions">
      <button type="button" class="icon-btn" id="notifBell" aria-label="通知">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-badge hidden" id="notifBadge">0</span>
      </button>
      <button type="button" class="icon-btn" id="openSettings" aria-label="設定">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <button type="button" class="fab-compose" id="openCreate" aria-label="封じる">+</button>

  <!-- ① Private -->
  <section class="panel active" id="panel-private">
    <div class="panel-head" style="padding-top:0">
      <h1 style="font-size:28px;font-weight:600">Private</h1>
      <p class="sub">自分だけのタイムカプセル · 日記 · メモ</p>
    </div>
    <div class="private-list" id="privateList"></div>
  </section>

  <!-- ② Shared -->

function playTone(freq,dur,type='sine',vol=.15){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
    o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playSealDrop(){playTone(80,.25,'sine',.2);setTimeout(()=>playTone(50,.15,'triangle',.12),80)}

/* IndexedDB for photos/videos */
let pendingMedia=null;

function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,1);
    r.onupgradeneeded=()=>r.result.createObjectStore('media');
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function idbPut(id,data){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction('media','readwrite');
    tx.objectStore('media').put(data,id);
    tx.oncomplete=()=>res();
    tx.onerror=()=>rej(tx.error);
  });
}
async function idbGet(id){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction('media','readonly');
    const rq=tx.objectStore('media').get(id);
    rq.onsuccess=()=>res(rq.result);
    rq.onerror=()=>rej(rq.error);
  });
}

function compressImage(file,maxW=900,q=.72){
  return new Promise((res,rej)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const s=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*s;c.height=img.height*s;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg',q));
    };
    img.onerror=rej;img.src=url;
  });
}
function readFileAsDataUrl(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

  return`<div class="tl-thumb ${cls}"><span class="tl-placeholder">${TYPE_ICONS[c.type]||'🔒'}</span></div>`;
}

if(S.auth===undefined)S.auth=null;
if(!S.dailyState)S.dailyState=defaults().dailyState;
if(S.dailyState.date!==todayStr()){
  S.dailyState={date:todayStr(),openedUserIds:['me'],postsCount:0,activeMembersCount:MEMBER_COUNT,isUnlocked:false};
}
if(!S.dailyState.openedUserIds.includes('me')){
  S.dailyState.openedUserIds.push('me');
}
if(!S.sealTo||S.sealTo==='group'){S.sealTo='self';S.sealVisibility='future'}
if(S.sealDays===undefined)S.sealDays=7;
if(!S.sealFriendId&&MEMBERS[0])S.sealFriendId=MEMBERS[0].id;
migrateMessages();
document.documentElement.dataset.theme=S.dark?'':'light';

function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){toast('保存容量がいっぱいです')}}
function pending(){return S.capsules.filter(c=>c.sealed&&new Date(c.openAt)>Date.now())}
function ready(){return S.capsules.filter(c=>c.sealed&&new Date(c.openAt)<=Date.now())}

function capState(c){
  if(S.opened?.some(o=>o.id===c.id))return 'OPENED';
  if(c.sealed&&new Date(c.openAt)<=Date.now())return 'WAITING';
  return 'LOCKED';
}
function stateLabel(s){return s==='LOCKED'?'封印中':s==='WAITING'?'開封待ち':'開封済み'}
function isPrivateCap(c){
  const me=S.auth?.name||USER;
  return c.to==='self'||(c.from===me||c.from==='ゆうま')&&c.visibility==='future';
}
function isSharedCap(c){
  return !isPrivateCap(c)&&(c.to==='group'||MEMBERS.some(m=>m.n===c.from||c.to===m.n));
}
function msgOpenAt(days){
  if(!days)return null;
  if(days===1)return addDays(1);
  if(days===7)return addDays(7);
  if(days===365)return addDays(365);
  return addDays(days);
}
function isMsgOpen(m){return !m.openAt||new Date(m.openAt)<=Date.now()}
function migrateMessages(){
  S.dms?.forEach(d=>d.messages.forEach(m=>{if(m.openAt===undefined)m.openAt=null}));
}

let activeFriendId=null;
let fdmDelayDays=0;
let fsTab='posts';

function switchTab(tab){
  document.querySelectorAll('.tab-nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+tab));
  if(tab!=='shared')closeFriendSpace();
  $('fdmCompose')?.classList.add('hidden');
  haptic();
}
document.querySelectorAll('.tab-nav-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

function closeFriendSpace(){
  activeFriendId=null;
  $('friendSpace')?.classList.remove('active');
  $('sharedListView')?.classList.remove('hidden');
  $('fdmCompose')?.classList.add('hidden');
}

function openFriendSpace(memberId){
  activeFriendId=memberId;
  const m=MEMBERS.find(x=>x.id===memberId);
  if(!m)return;
  $('fsName').textContent=m.n;
  $('sharedListView').classList.add('hidden');
  $('friendSpace').classList.add('active');
  fsTab='posts';
  document.querySelectorAll('.fs-tab').forEach(t=>t.classList.toggle('on',t.dataset.fstab==='posts'));
  $('fsPosts').classList.remove('hidden');
  $('fsChat').classList.add('hidden');
  renderFriendSpace();
  haptic();
}

function renderPrivate(){
  const el=$('privateList');
  const me=S.auth?.name||USER;
  const caps=S.capsules.filter(c=>(c.from===me||c.from==='ゆうま')&&isPrivateCap(c));
  const opened=(S.opened||[]).filter(o=>(o.from===me||o.from==='ゆうま')&&o.to==='self');
  const items=[
    ...caps.map(c=>({...c,state:capState(c)})),
    ...opened.map(o=>({...o,state:'OPENED',sealed:false,openAt:o.openedAt})),
  ].sort((a,b)=>(b.createdAt||b.openedAt||0)-(a.createdAt||a.openedAt||0));
  if(!items.length){
    el.innerHTML='<div class="empty-state" style="padding:40px 0">Privateは空です。<br>＋から未来の自分へ封じましょう。</div>';
    return;
  }
  el.innerHTML=items.map(c=>{
    const st=c.state||capState(c);
    const canOpen=st==='WAITING';
    return`<article class="private-card${canOpen?' ready':''}" data-id="${esc(c.id)}" data-open="${canOpen?'1':''}">
      <div class="pc-date">${new Date(c.createdAt||c.openedAt||Date.now()).toLocaleDateString('ja-JP')}</div>
      <div class="pc-text">${esc(c.text||'（記憶）')}</div>
      ${c.mediaId?`<div class="pc-thumb"><img data-lazy="${esc(c.mediaId)}" alt=""></div>`:''}
      <div class="pc-meta">
        <span class="state-pill ${st.toLowerCase()}">${stateLabel(st)}</span>
        <span class="pc-open">${st==='LOCKED'?formatWhen(c):st==='WAITING'?'タップして開封':'開封済み'}</span>
      </div>
    </article>`;
  }).join('');
  loadLazyThumbs(el);
  el.querySelectorAll('[data-open="1"]').forEach(card=>card.addEventListener('click',()=>{
    const cap=S.capsules.find(c=>c.id===card.dataset.id);
    if(cap)startOpening([cap],false);
  }));
}

function renderShared(){
  const el=$('sharedList');
  el.innerHTML=MEMBERS.map(m=>{
    const dm=S.dms?.find(d=>d.withId===m.id);
    const sealedMsgs=dm?.messages.filter(x=>!isMsgOpen(x)).length||0;
    const posts=S.capsules.filter(c=>c.from===m.n||c.to===m.n).length;
    const preview=dm?.messages[dm.messages.length-1];
    const sub=sealedMsgs?`${sealedMsgs}件の未来DM`:preview?preview.text.slice(0,24):`${posts}件の記憶`;
    return`<div class="friend-row" data-mid="${m.id}">
      <div class="fr-av" style="background:${m.c}">${m.i}</div>
      <div class="fr-body">
        <div class="fr-name">${esc(m.n)}</div>
        <div class="fr-sub">${esc(sub)}</div>
      </div>
      ${sealedMsgs?`<span class="fr-badge">${sealedMsgs}</span>`:''}
    </div>`;
  }).join('');
  el.querySelectorAll('.friend-row').forEach(r=>r.addEventListener('click',()=>openFriendSpace(r.dataset.mid)));
}

function renderFriendSpace(){
  if(!activeFriendId)return;
  const m=MEMBERS.find(x=>x.id===activeFriendId);
  if(!m)return;
  const postsEl=$('fsPosts');
  const chatEl=$('fsChat');
  const me=S.auth?.name||USER;
  const posts=S.capsules.filter(c=>c.from===m.n||(c.to===m.n&&(c.from===me||c.from==='ゆうま')));
  postsEl.innerHTML=posts.length?posts.map(c=>`
    <div class="fs-post">
      <div class="fp-when">${formatWhen(c)} · ${TYPE_JA[c.type]||c.type}</div>
      <div class="fp-text">${esc(c.text||'（封じられた記憶）')}</div>
    </div>`).join(''):'<div class="empty-state" style="padding:24px 0">Future Postsはまだありません</div>';

  const dm=S.dms?.find(d=>d.withId===activeFriendId);
  if(dm){
    chatEl.innerHTML=dm.messages.map(msg=>{
      const mine=msg.from===me||msg.from==='ゆうま';
      if(!isMsgOpen(msg)){
        const d=daysUntil(msg.openAt);
        return`<div class="fdm-bubble sealed">${mine?'':'🔒 '}${d?`あと${d}日で開封`:'まもなく開封'}</div>`;
      }
      return`<div class="fdm-bubble ${mine?'me':'them'}">${esc(msg.text)}</div>`;
    }).join('');
  }else chatEl.innerHTML='<div class="empty-state">未来DMを送ってみましょう</div>';

  $('fdmCompose').classList.toggle('hidden',fsTab!=='chat');
}

function renderArchive(){
  const el=$('archiveView');
  const opened=S.opened||[];
  const month=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long'});
  const days=['日','月','火','水','木','金','土'];
  const grid=opened.slice(0,12).map((o,i)=>{
    if(o.mediaId)return`<div class="archive-cell"><img data-lazy="${esc(o.mediaId)}" alt=""><span class="ac-day">${days[i%7]}</span></div>`;
    return`<div class="archive-cell text-cell">${esc((o.text||'').slice(0,20))}</div>`;
  }).join('');
  const log=opened.map(o=>`
    <div class="archive-log-item">
      ${o.mediaId?`<div class="ali-thumb"><img data-lazy="${esc(o.mediaId)}" alt=""></div>`:'<div class="ali-thumb" style="display:grid;place-items:center;font-size:18px">📝</div>'}
      <div class="ali-body">
        <div class="ali-title">${esc(o.from)} · ${TYPE_JA[o.type]||o.type}</div>
        <div class="ali-sub">${new Date(o.openedAt).toLocaleDateString('ja-JP')} · ${esc((o.text||'').slice(0,40))}</div>
      </div>
    </div>`).join('');
  el.innerHTML=`
    <div class="archive-month">${month}</div>
    <div class="archive-grid">${grid||'<div class="empty-state" style="grid-column:1/-1">まだ開封した記憶がありません</div>'}</div>
    <div class="sec-label">開封ログ</div>
    <div class="archive-log">${log||'<div class="empty-state">ログは空です</div>'}</div>`;
  loadLazyThumbs(el);
}

function renderProfile(){
  renderAuth();
  const name=S.auth?.loggedIn?S.auth.name:USER;
  $('profileAvatar').textContent=name.charAt(0);
  $('profileName').textContent=name;
  $('profileBio').innerHTML=S.auth?.loggedIn?esc(S.auth.email):'時間遅延型の感情保存';

    <button type="button" class="create-friend-chip${S.sealFriendId===m.id?' on':''}" data-fid="${m.id}">${esc(m.n)}</button>`).join('');
  $('createFriendRow')?.querySelectorAll('.create-friend-chip').forEach(b=>b.addEventListener('click',()=>{
    S.sealFriendId=b.dataset.fid;save();renderProfile();
    document.querySelectorAll('.create-friend-chip').forEach(x=>x.classList.toggle('on',x.dataset.fid===S.sealFriendId));

function renderNotifBadge(){
  const unread=(S.homeNotifs||[]).filter(n=>!n.read).length;
  const readyN=ready().length;
  const badge=$('notifBadge');
  if(!badge)return;
  badge.textContent=unread+readyN;
  badge.classList.toggle('hidden',!(unread+readyN));
}

function renderAll(){
  migrateMessages();
  renderPrivate();
  renderShared();
  if(activeFriendId)renderFriendSpace();
  renderArchive();
  renderProfile();
  renderNotifBadge();
  renderNotifDropdown();
}

function timeAgo(ts){
  const d=Math.floor((Date.now()-ts)/60000);
  if(d<1)return 'たった今';
  if(d<60)return `${d}分前`;
  const h=Math.floor(d/60);
  if(h<24)return `${h}時間前`;
  return `${Math.floor(h/24)}日前`;
}

function renderNotifDropdown(){
  const el=$('notifDropdownList');
  if(!el)return;
  const notifs=S.homeNotifs||[];
  const r=ready();
  if(r.length&&!notifs.find(n=>n.action==='open'))
    notifs.unshift({id:'rn',title:'開封可能な記憶',sub:`${r.length}件`,read:false,action:'open'});
  if(!notifs.length){el.innerHTML='<div class="empty-state" style="padding:24px">通知はありません</div>';return}
  el.innerHTML=notifs.map(n=>`
    <div class="notif-drop-item${n.read?'':' unread'}" data-nid="${esc(n.id)}" data-action="${n.action||''}" data-dmid="${n.dmId||''}">
      <div class="nd-title">${esc(n.title)}</div>
      <div class="nd-sub">${esc(n.sub)}</div>
    </div>`).join('');
  el.querySelectorAll('.notif-drop-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const n=S.homeNotifs.find(x=>x.id===item.dataset.nid);
      if(n&&!n.read){n.read=true;save();renderNotifBadge();item.classList.remove('unread')}
      $('notifDropdown')?.classList.remove('open');
      if(item.dataset.action==='open'&&ready().length)startGroupSync(ready());
      else if(item.dataset.action==='dm'){switchTab('shared');if(item.dataset.dmid){const dm=S.dms.find(x=>x.id===item.dataset.dmid);if(dm)openFriendSpace(dm.withId)}}
      haptic();
    });
  });
}

function renderAuth(){
  const el=$('authSection');
  if(!el)return;
  if(S.auth?.loggedIn){
    el.innerHTML=`<div class="auth-card"><div class="auth-logged">
      <div class="auth-av">${esc(S.auth.name.charAt(0))}</div>
      <div class="auth-info"><div style="font-weight:600">${esc(S.auth.name)}</div><div class="auth-email">${esc(S.auth.email)}</div></div>
      <button type="button" class="auth-logout" id="authLogout">ログアウト</button>
    </div></div>`;
    $('authLogout')?.addEventListener('click',()=>{S.auth=null;save();renderAll();toast('ログアウトしました');haptic()});
    return;
  }
  const mode=S.authMode||'login';
  el.innerHTML=`<div class="auth-card"><h3>${mode==='login'?'ログイン':'アカウント作成'}</h3>
    <div class="auth-tabs">
      <button type="button" class="${mode==='login'?'on':''}" data-authmode="login">ログイン</button>
      <button type="button" class="${mode==='signup'?'on':''}" data-authmode="signup">新規登録</button>
    </div>
    <div class="auth-field"><label>名前</label><input type="text" id="authName" placeholder="ゆうま"></div>
    <div class="auth-field"><label>メール</label><input type="email" id="authEmail" placeholder="you@example.com"></div>
    <div class="auth-field"><label>パスワード</label><input type="password" id="authPass"></div>
    <button type="button" class="auth-submit" id="authSubmit">${mode==='login'?'ログイン':'作成'}</button>
  </div>`;
  el.querySelectorAll('[data-authmode]').forEach(b=>b.addEventListener('click',()=>{S.authMode=b.dataset.authmode;renderAuth();haptic()}));
  $('authSubmit')?.addEventListener('click',()=>{
    const name=$('authName').value.trim(),email=$('authEmail').value.trim(),pass=$('authPass').value;
    if(!name||!email||!pass){toast('すべて入力してください');return}
    if(mode==='signup'){
      if(S.users.find(u=>u.email===email)){toast('登録済みです');return}
      S.users.push({name,email,pass});S.auth={name,email,loggedIn:true};toast('作成しました');
    }else{
      const u=S.users.find(x=>x.email===email&&x.pass===pass);
      if(!u){toast('認証に失敗');return}
      S.auth={name:u.name,email:u.email,loggedIn:true};toast('ログインしました');
    }
    save();renderAll();haptic();
  });
}

  try{

    pendingMedia={type:'photo',dataUrl};
    $('mediaPreviewInner').innerHTML=`<img src="${dataUrl}" alt="preview">`;
    $('mediaPreview').classList.add('show');

});

});

async function sealCapsule({caption,media,fromCreate}){
  if(!media&&!caption){toast('写真・動画・言葉のいずれかを追加してください');return}
  const type=media?media.type:'text';
  let openAt,days;
  const isShared=fromCreate&&S.sealVisibility==='shared';
  const isPrivate=!isShared;
  let to='self';
  if(isShared){
    const m=MEMBERS.find(x=>x.id===(S.sealFriendId||MEMBERS[0]?.id));
    if(!m){toast('送り先の友達を選んでください');return}
    to=m.n;
  }
  const vis=isShared?'shared':'future';
  const isDemoFirst=!S.firstSealDone&&isPrivate;
  if(isDemoFirst){openAt=addMinutes(1);days=0;toast('初回体験 — 1分後に開封！')}
  else{
    days=S.sealDays==='custom'?+($('customDaysInput').value||14):S.sealDays||7;
    openAt=addDays(days);
  }
  const capId='c'+Date.now();
  if(media){
    try{await idbPut(capId,media.dataUrl)}catch(e){toast('メディアの保存に失敗');return}
  }
  const displayText=caption||(media?`（${TYPE_JA[type]}）`:'');
  const doSeal=()=>{
    const fromName=S.auth?.loggedIn?S.auth.name:'ゆうま';
    S.capsules.unshift({
      id:capId,from:fromName,to,visibility:vis,type,
      text:displayText,sealed:true,openAt,days,
      mediaId:media?capId:null,createdAt:Date.now(),
    });
    if(isDemoFirst)S.firstSealDone=true;
    S.streak=(S.streak||0)+1;
    if(fromCreate){
      $('createInput').value='';
      pendingMedia=null;
      $('mediaPreview').classList.remove('show');
      $('mediaPreviewInner').innerHTML='';
      updateMediaPickState();
      overlay.classList.remove('open');
    }
    save();renderAll();
    if(isDemoFirst)setTimeout(()=>{if(ready().length)toast('カプセルが開封可能になりました！')},60000);
    else toast('封じました');
    switchTab(isShared?'shared':'private');
    if(isShared){
      const fm=MEMBERS.find(x=>x.n===to);
      if(fm)openFriendSpace(fm.id);
    }
  };
  $('sealOrigami').textContent=displayText||'封じる記憶…';
  runSealAnimation(doSeal);
}
