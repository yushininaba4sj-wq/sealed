function sendFutureDm(){
  if(!activeFriendId)return;
  const text=$('fdmInput')?.value.trim();
  if(!text)return;
  const me=S.auth?.name||USER;
  const m=MEMBERS.find(x=>x.id===activeFriendId);
  if(!m)return;
  let dm=(S.dms||[]).find(d=>d.withId===activeFriendId);
  if(!dm){
    dm={id:'d'+Date.now(),with:m.n,withId:activeFriendId,unread:0,messages:[]};
    S.dms=S.dms||[];S.dms.push(dm);
  }
  const openAt=fdmDelayDays?addDays(fdmDelayDays):null;
  dm.messages.push({from:me,text,at:Date.now(),openAt});
  $('fdmInput').value='';
  save();renderFriendSpace();renderShared();
  toast(fdmDelayDays?`${fdmDelayDays===1?'1日':fdmDelayDays===7?'1週間':fdmDelayDays===365?'1年':fdmDelayDays+'日'}後に届くメッセージを封じました`:'メッセージを送信しました');
  haptic();
}
$('fdmSend')?.addEventListener('click',sendFutureDm);
$('fdmInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')sendFutureDm()});

/* Legacy DM overlay — optional */
$('dmClose')?.addEventListener('click',()=>$('dmOverlay')?.classList.remove('open'));
$('dmOverlay')?.addEventListener('click',e=>{if(e.target===$('dmOverlay'))$('dmOverlay').classList.remove('open')});

function runSealAnimation(cb){
  const anim=$('sealAnim');
  anim.className='seal-anim active';
  haptic();
  setTimeout(()=>{anim.classList.add('phase-fold');haptic()},200);
  setTimeout(()=>{anim.classList.add('phase-seal');playSealDrop();haptic()},600);
  setTimeout(()=>{anim.classList.add('phase-glow');haptic()},1000);
  setTimeout(()=>{anim.classList.add('phase-fly');haptic()},1400);
  setTimeout(()=>{anim.className='seal-anim';cb()},2600);
}

/* Group sync opening */
let openingItems=[];
function startGroupSync(items){
  openingItems=items;
  const ev=$('everyoneOverlay');
  ev.classList.add('active');
  setTimeout(()=>{
    ev.classList.remove('active');
    const cd=$('syncCountdown');
    cd.classList.remove('hidden');
    $('syncStatus').textContent='OPENING IN';
    let n=3;cd.textContent=n;
    const iv=setInterval(()=>{
      n--;
      if(n>0)cd.textContent=n;
      else{
        clearInterval(iv);
        cd.textContent='開封！';
        haptic();try{navigator.vibrate?.([30,20,30])}catch(e){}
        S.dailyState.isUnlocked=true;save();
        setTimeout(()=>startOpening(items,true),400);
      }
    },1000);
  },1500);
}

$('syncBtn').addEventListener('click',()=>{
  S.syncOnline=Math.min(MEMBER_COUNT,(S.syncOnline||3)+1);
  if(!S.dailyState.openedUserIds.includes('sync'+S.syncOnline))
    S.dailyState.openedUserIds.push('sync'+S.syncOnline);
  save();renderAll();
  if(S.syncOnline>=Math.ceil(MEMBER_COUNT*QUORUM)&&ready().length)startGroupSync(ready());
  else toast(`${S.syncOnline}/${MEMBER_COUNT} 人がオンライン`);
});

function makeStars(){
  $('stars').innerHTML=Array.from({length:50},()=>{
    const s=Math.random()*2+.5;
    return`<div class="star" style="left:${Math.random()*100}%;top:${Math.random()*100}%;width:${s}px;height:${s}px;animation-delay:${Math.random()*3}s"></div>`;
  }).join('');
}
function makeParticles(){
  $('particles').innerHTML=Array.from({length:12},(_,i)=>`
    <div class="particle" style="left:${Math.random()*100}%;bottom:-10px;animation-delay:${i*.6}s"></div>`).join('');
}

function startOpening(items,flash){
  openingItems=items;
  makeStars();makeParticles();
  const selfItem=items.find(c=>c.to==='self'&&c.from==='ゆうま');
  $('openingPoetic').innerHTML=selfItem
    ?'✉️ 過去から、何かが届きました。<br><span style="font-size:14px;opacity:.65;font-weight:400">1年前の自分が、あなたに何かを残していました。</span>'
    :'✨ カプセルの開封時です。<br><span style="font-size:14px;opacity:.65;font-weight:400">身内の記憶が、ようやくよみがえります。</span>';
  $('openingEnvelope').classList.remove('opened');
  $('openingEnvelope').style.opacity='1';
  $('dragSeal').classList.remove('hidden');
  $('dragSeal').style.transform='translateX(-50%)';
  $('openingHint').style.display='';
  $('revealStack').classList.remove('show');
  $('revealStack').innerHTML='';
  $('reactions').classList.remove('show');
  $('exportBtn').classList.remove('show');
  const op=$('opening');
  op.classList.add('active');
  if(flash){op.classList.add('flash');setTimeout(()=>op.classList.remove('flash'),500)}
  haptic();
}

$('openingClose').addEventListener('click',()=>$('opening').classList.remove('active'));

const dragSeal=$('dragSeal');
let dragging=false,startY=0,currentY=0;
function onDragStart(y){dragging=true;startY=y;currentY=0;haptic()}
function onDragMove(y){
  if(!dragging)return;
  currentY=Math.min(0,y-startY);
  dragSeal.style.transform=`translateX(-50%) translateY(${currentY}px)`;
  if(currentY<-70)finishOpen();
}
function onDragEnd(){if(!dragging)return;dragging=false;if(currentY>-70)dragSeal.style.transform='translateX(-50%)'}

dragSeal.addEventListener('mousedown',e=>onDragStart(e.clientY));
dragSeal.addEventListener('touchstart',e=>onDragStart(e.touches[0].clientY),{passive:true});
window.addEventListener('mousemove',e=>onDragMove(e.clientY));
window.addEventListener('touchmove',e=>onDragMove(e.touches[0].clientY),{passive:true});
window.addEventListener('mouseup',onDragEnd);
window.addEventListener('touchend',onDragEnd);

function typewriter(el,text,cb){
  el.textContent='';el.classList.add('typewriter');
  let i=0;
  const iv=setInterval(()=>{
    el.textContent+=text[i++]||'';
    if(i>=text.length){clearInterval(iv);cb?.()}
  },35);
}

function finishOpen(){
  if($('revealStack').classList.contains('show'))return;
  dragging=false;
  dragSeal.classList.add('hidden');
  $('openingEnvelope').classList.add('opened');
  $('openingHint').style.display='none';
  playTear();
  haptic();try{navigator.vibrate?.([20,30,20])}catch(e){}

  setTimeout(async()=>{
    $('openingEnvelope').style.opacity='0';
    $('revealStack').classList.add('show');
    const mediaBlocks=await Promise.all(openingItems.map(async c=>{
      let media='';
      if(c.mediaId){
        const data=await idbGet(c.mediaId);
        if(data){
          if(c.type==='photo')media=`<div class="thumb"><img src="${data}" alt=""></div>`;
          else if(c.type==='video')media=`<div class="thumb"><video src="${data}" autoplay muted loop playsinline></video></div>`;
        }
      }
      if(!media&&c.type==='photo')media='<div class="thumb">📷</div>';
      if(!media&&c.type==='video')media='<div class="thumb">▶️</div>';
      return media;
    }));
    $('revealStack').innerHTML=openingItems.map((c,i)=>`
      <div class="reveal-item ${c.type}" style="animation-delay:${i*.25}s">
        <div class="from">${esc(c.from)} · ${TYPE_JA[c.type]||c.type}</div>
        <div class="text" id="tw-${i}"></div>
        ${mediaBlocks[i]||''}
      </div>`).join('');
    openingItems.forEach((c,i)=>{
      const el=document.getElementById('tw-'+i);
      if(el)setTimeout(()=>typewriter(el,c.text,()=>{
        if(i===openingItems.length-1)$('exportBtn').classList.add('show');
      }),i*400);
    });
    $('reactions').classList.add('show');
    S.opened=S.opened||[];
    openingItems.forEach(c=>S.opened.unshift({
      id:c.id,from:c.from,to:c.to,type:c.type,text:c.text,openedAt:Date.now(),mediaId:c.mediaId,
    }));
    S.capsules=S.capsules.filter(c=>!openingItems.find(r=>r.id===c.id));
    save();renderAll();
  },900);
}

$('exportBtn').addEventListener('click',()=>{
  haptic();
  toast(`リキャップ動画を生成中… Sealed with ${GROUP}`);
  setTimeout(()=>toast('シェア用動画の準備ができました（デモ）'),1500);
});

$('darkToggle').addEventListener('click',()=>{
  S.dark=!S.dark;
  document.documentElement.dataset.theme=S.dark?'':'light';
  save();renderProfile();haptic();
});

updateCreateUI();
(async()=>{
  try{
    if(!(await idbGet('demo_photo'))){
      const c=document.createElement('canvas');c.width=400;c.height=300;
      const g=c.getContext('2d');
      const gr=g.createLinearGradient(0,0,400,300);
      gr.addColorStop(0,'#8A8A8A');gr.addColorStop(1,'#D0D0CE');
      g.fillStyle=gr;g.fillRect(0,0,400,300);
      g.fillStyle='#fff';g.font='20px sans-serif';g.fillText('Time Cap',140,160);
      await idbPut('demo_photo',c.toDataURL('image/jpeg',.8));
    }
  }catch(e){}
  save();renderAll();
})();
</script>
